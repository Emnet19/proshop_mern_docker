global:
  scrape_interval: 5s

scrape_configs:

  - job_name: backend1
    static_configs:
      - targets:
          - backend1:5000

  - job_name: backend2
    static_configs:
      - targets:
          - backend2:5000

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: nginx
    static_configs:
      - targets:
          - nginx-exporter:9113