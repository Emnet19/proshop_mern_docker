services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # mongodb+srv://<emnbef234_db_user>:<ITIyZDDUI4NfJ82W>@cluster0.b5cjst2.mongodb.net/?appName=Cluster0
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: https://proshop-backend.onrender.com

    ports:
      - "80:80"

    depends_on:
      - backend

  mongo:
    image: mongo:8
    container_name: proshop_mongo
    ports:
      - "27017:27017"
    volumes:
      - ./database:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s