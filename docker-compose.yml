services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app/backend
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/proshop
      JWT_SECRET: dev-secret-key
      PAYPAL_CLIENT_ID: sandbox
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    stdin_open: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_OPTIONS: "--openssl-legacy-provider"
      REACT_APP_API_URL: https://proshop-backend.onrender.com
    depends_on:
      - backend

  mongo:
    image: mongo:8
    container_name: proshop_mongo
    ports:
      - "27017:27017"
    volumes:
      - ./database:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
